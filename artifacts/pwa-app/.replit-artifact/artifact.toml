kind = "web"
previewPath = "/"
title = "Mobile PWA"
version = "1.0.0"
id = "artifacts/pwa-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25088

[services.development]
run = "pnpm --filter @workspace/pwa-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pwa-app", "run", "build" ]
publicDir = "artifacts/pwa-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25088"
BASE_PATH = "/"
