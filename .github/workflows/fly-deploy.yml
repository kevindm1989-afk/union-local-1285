name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify required secrets
        run: |
          SECRETS=$(flyctl secrets list 2>/dev/null || echo "")
          if ! echo "$SECRETS" | grep -q "SESSION_SECRET"; then
            echo "⚠️  SESSION_SECRET is not set on the Fly.io app."
            echo "Run: fly secrets set SESSION_SECRET=\"\$(openssl rand -hex 32)\""
            exit 1
          fi
          echo "✅ Required secrets present."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Provision Tigris storage (first run only)
        run: |
          # Create Tigris bucket if BUCKET_NAME secret is not already set on the app.
          # `fly storage create` is idempotent-safe; it exits 0 if a bucket is already linked.
          SECRETS=$(flyctl secrets list 2>/dev/null || echo "")
          if ! echo "$SECRETS" | grep -q "BUCKET_NAME"; then
            echo "No Tigris bucket found — provisioning..."
            flyctl storage create --name union-local-1285-cba --yes || true
          else
            echo "Tigris bucket already linked, skipping."
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
