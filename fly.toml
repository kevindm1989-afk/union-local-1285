app = "union-local-1285"
primary_region = "ord"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"
  # Required secrets — set via: fly secrets set KEY=value
  # DATABASE_URL
  # SESSION_SECRET
  # ANTHROPIC_API_KEY
  # ADMIN_PASSWORD
  # RESEND_API_KEY
  # PORTAL_URL
  # EMAIL_FROM
  # Optional — SMS disabled if missing:
  # TWILIO_ACCOUNT_SID
  # TWILIO_AUTH_TOKEN
  # TWILIO_FROM
  # Optional — S3 storage falls back to local disk if missing:
  # AWS_ACCESS_KEY_ID
  # AWS_SECRET_ACCESS_KEY
  # BUCKET_NAME
  # AWS_ENDPOINT_URL_S3
  # AWS_REGION

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/healthz"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
