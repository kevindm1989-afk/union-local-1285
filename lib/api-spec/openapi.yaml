openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Union Local 1285 Steward App
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: members
    description: Union member management
  - name: grievances
    description: Grievance tracking
  - name: announcements
    description: Union bulletins and announcements
  - name: dashboard
    description: Dashboard summaries
  - name: storage
    description: Object storage upload URL
  - name: documents
    description: CBA document management
  - name: anthropic
    description: Anthropic AI chat operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all members
      parameters:
        - in: query
          name: department
          schema:
            type: string
        - in: query
          name: classification
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createMember
      tags: [members]
      summary: Add a new member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberBody"
      responses:
        "201":
          description: Created member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{id}:
    get:
      operationId: getMember
      tags: [members]
      summary: Get a member by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Not found
    patch:
      operationId: updateMember
      tags: [members]
      summary: Update a member
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberBody"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
    delete:
      operationId: deleteMember
      tags: [members]
      summary: Remove a member
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /members/{id}/grievances:
    get:
      operationId: getMemberGrievances
      tags: [members]
      summary: Get grievances for a specific member
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of grievances for member
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grievance"

  /grievances:
    get:
      operationId: listGrievances
      tags: [grievances]
      summary: List all grievances
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, pending_response, pending_hearing, resolved, withdrawn]
        - in: query
          name: step
          schema:
            type: integer
        - in: query
          name: memberId
          schema:
            type: integer
      responses:
        "200":
          description: List of grievances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grievance"
    post:
      operationId: createGrievance
      tags: [grievances]
      summary: File a new grievance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGrievanceBody"
      responses:
        "201":
          description: Filed grievance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grievance"

  /grievances/{id}:
    get:
      operationId: getGrievance
      tags: [grievances]
      summary: Get a grievance by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Grievance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grievance"
        "404":
          description: Not found
    patch:
      operationId: updateGrievance
      tags: [grievances]
      summary: Update a grievance
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGrievanceBody"
      responses:
        "200":
          description: Updated grievance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grievance"
    delete:
      operationId: deleteGrievance
      tags: [grievances]
      summary: Delete a grievance
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /grievances/stats/summary:
    get:
      operationId: getGrievancesSummary
      tags: [grievances]
      summary: Get grievance statistics
      responses:
        "200":
          description: Grievance stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrievancesSummary"

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      parameters:
        - in: query
          name: category
          schema:
            type: string
            enum: [general, urgent, contract, meeting, action]
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Post a new announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementBody"
      responses:
        "201":
          description: Created announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    get:
      operationId: getAnnouncement
      tags: [announcements]
      summary: Get an announcement by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    patch:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update an announcement
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnnouncementBody"
      responses:
        "200":
          description: Updated announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent grievances and announcements
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentActivity"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all CBA documents
      responses:
        "200":
          description: Documents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Save document metadata after upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update document metadata
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted


  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"

  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"

  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Member:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        employeeId:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        classification:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        joinDate:
          type: string
          format: date
          nullable: true
        isActive:
          type: boolean
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, isActive, createdAt, updatedAt]

    CreateMemberBody:
      type: object
      properties:
        name:
          type: string
        employeeId:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        classification:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        joinDate:
          type: string
          format: date
          nullable: true
        isActive:
          type: boolean
          default: true
        notes:
          type: string
          nullable: true
      required: [name]

    UpdateMemberBody:
      type: object
      properties:
        name:
          type: string
        employeeId:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        classification:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        joinDate:
          type: string
          format: date
          nullable: true
        isActive:
          type: boolean
        notes:
          type: string
          nullable: true

    Grievance:
      type: object
      properties:
        id:
          type: integer
        grievanceNumber:
          type: string
        memberId:
          type: integer
          nullable: true
        memberName:
          type: string
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        contractArticle:
          type: string
          nullable: true
        step:
          type: integer
        status:
          type: string
          enum: [open, pending_response, pending_hearing, resolved, withdrawn]
        filedDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
          nullable: true
        resolvedDate:
          type: string
          format: date
          nullable: true
        resolution:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, grievanceNumber, title, step, status, filedDate, createdAt, updatedAt]

    CreateGrievanceBody:
      type: object
      properties:
        memberId:
          type: integer
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        contractArticle:
          type: string
          nullable: true
        step:
          type: integer
          default: 1
        status:
          type: string
          enum: [open, pending_response, pending_hearing, resolved, withdrawn]
          default: open
        filedDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true
      required: [title, filedDate]

    UpdateGrievanceBody:
      type: object
      properties:
        memberId:
          type: integer
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        contractArticle:
          type: string
          nullable: true
        step:
          type: integer
        status:
          type: string
          enum: [open, pending_response, pending_hearing, resolved, withdrawn]
        filedDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
          nullable: true
        resolvedDate:
          type: string
          format: date
          nullable: true
        resolution:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    GrievancesSummary:
      type: object
      properties:
        total:
          type: integer
        open:
          type: integer
        pending_response:
          type: integer
        pending_hearing:
          type: integer
        resolved:
          type: integer
        withdrawn:
          type: integer
        overdue:
          type: integer
        step1:
          type: integer
        step2:
          type: integer
        step3:
          type: integer
        step4:
          type: integer
      required: [total, open, pending_response, pending_hearing, resolved, withdrawn, overdue, step1, step2, step3, step4]

    Announcement:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        category:
          type: string
          enum: [general, urgent, contract, meeting, action]
        isUrgent:
          type: boolean
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, content, category, isUrgent, publishedAt, createdAt, updatedAt]

    CreateAnnouncementBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        category:
          type: string
          enum: [general, urgent, contract, meeting, action]
          default: general
        isUrgent:
          type: boolean
          default: false
      required: [title, content]

    UpdateAnnouncementBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        category:
          type: string
          enum: [general, urgent, contract, meeting, action]
        isUrgent:
          type: boolean

    DashboardSummary:
      type: object
      properties:
        totalMembers:
          type: integer
        activeMembers:
          type: integer
        openGrievances:
          type: integer
        overdueGrievances:
          type: integer
        grievancesThisMonth:
          type: integer
        urgentAnnouncements:
          type: integer
      required: [totalMembers, activeMembers, openGrievances, overdueGrievances, grievancesThisMonth, urgentAnnouncements]

    RecentActivity:
      type: object
      properties:
        recentGrievances:
          type: array
          items:
            $ref: "#/components/schemas/Grievance"
        recentAnnouncements:
          type: array
          items:
            $ref: "#/components/schemas/Announcement"
      required: [recentGrievances, recentAnnouncements]

    Document:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        filename:
          type: string
        objectPath:
          type: string
        contentType:
          type: string
        fileSize:
          type: string
          nullable: true
        isCurrent:
          type: boolean
        effectiveDate:
          type: string
          nullable: true
        expirationDate:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        uploadedAt:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, title, filename, objectPath, contentType, isCurrent, uploadedAt, createdAt, updatedAt]

    CreateDocumentBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        filename:
          type: string
        objectPath:
          type: string
        contentType:
          type: string
        fileSize:
          type: string
          nullable: true
        isCurrent:
          type: boolean
        effectiveDate:
          type: string
          nullable: true
        expirationDate:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required: [title, filename, objectPath, contentType]

    UpdateDocumentBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        isCurrent:
          type: boolean
        effectiveDate:
          type: string
          nullable: true
        expirationDate:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    RequestUploadUrlBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required: [name, size, contentType]

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
      required: [uploadURL, objectPath]
    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    CreateAnthropicConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendAnthropicMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    AnthropicError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
